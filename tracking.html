<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
    <title>Christopher Benson - Tracking</title>
  </head>
  <body>
    <header>
      <a href="/index.html">Back</a>
    </header>
    <main id="main">
      <section aria-labelledby="hobbies-heading">
        <h2 id="hobbies-heading">Hobbies</h2>
        <ul>
          <li>chess.com elo:</li>
          <li>github followers:</li>
        </ul>
      </section>
      <section aria-labelledby="markets-heading">
        <h2 id="markets-heading">Other</h2>
        <ul>
          <li>IL unleaded:</li>
          <li>weather:</li>
        </ul>
      </section>
    </main>
    <script>
const C={chesscom:"cjb543",github:"cjb543",lat:41.8827,lon:-87.6233};
function setLi(l,v){for(const li of document.querySelectorAll("li"))if(li.textContent.trimStart().toLowerCase().startsWith(l.toLowerCase())){li.textContent=li.textContent.split(":")[0]+": "+v;return;}}
function setPrice(l,p,c){setLi(l,`${p}. ${c}`);}
async function safe(fn){try{await fn();}catch(e){console.warn(e);}}
async function fetchChesscom(){const r=await fetch(`https://api.chess.com/pub/player/${C.chesscom}/stats`);const d=await r.json();const e=d.chess_rapid?.last?.rating??d.chess_blitz?.last?.rating??d.chess_bullet?.last?.rating??"N/A";setLi("chess.com elo",e);}
async function fetchGasIL(){const s="EMM_EPMR_PTE_YORD_DPG";const r=await fetch(`https://api.eia.gov/v2/petroleum/pri/gnd/data/?frequency=weekly&data[0]=value&facets[series][]=${s}&sort[0][column]=period&sort[0][direction]=desc&length=2&api_key=rxTWS6udd2XMump4UNp4hgLYWudsAFa7Rzwjvr5E`);const d=await r.json();const[curr,prev]=d.response.data;const price="$"+parseFloat(curr.value).toFixed(2);const delta=(parseFloat(curr.value)-parseFloat(prev.value)).toFixed(2);const change=(delta>=0?"+$":"-$")+Math.abs(delta);setPrice("IL unleaded",price,change);}
async function fetchGithub(){const r=await fetch(`https://api.github.com/users/${C.github}`);const d=await r.json();setLi("github followers",d.followers??"N/A");}
async function fetchWeather(){const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${C.lat}&longitude=${C.lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);const d=await r.json();const t=d.current?.temperature_2m;setLi("weather",t!=null?`${t}°F`:"N/A");}
setLi("chess.com elo","N/A");setLi("github followers","N/A");setLi("weather","N/A");
Promise.allSettled([safe(fetchChesscom),safe(fetchGasIL),safe(fetchGithub),safe(fetchWeather)]);
    </script>
  </body>
</html>
